services:
  postgres:
    image: postgres:16-alpine
    container_name: teaching_records_postgres
    environment:
      POSTGRES_USER: class_records
      POSTGRES_PASSWORD: class_records
      POSTGRES_DB: class_records
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U class_records -d class_records"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
